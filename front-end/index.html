<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initialScale=1" />
    <title>SignBridge - SIBI & BISINDO Detection to Text</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <img src="signbridge.png" alt="SignBridge Logo" class="logo-image" />
    </header>
    <main>
        <div id="video container">
            <video id="webcam" autoplay muted playsinline></video>
        </div>
        <div>
            <label for="message-box">Pesan:</label>
            <textarea id="message-box" row="3" readonly placeholder="Pesan terdeteksi akan muncul di sini..."></textarea>
        </div>
        <div>
            <label for="suggested-word">Saran kata:</label>
            <input type="text" id="suggested-word" readonly placeholder="Saran kata akan muncul di sini..." />
        </div>        
        <div class="button-group">
            <button id="detect-btn" title="Mulai mendeteksi">Mulai Deteksi</button>
            <button id="speak-btn" title="Ucapkan pesan terdeteksi" aria-label="Ucapkan pesan terdeteksi">
                <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="50" height="40" viewBox="0 0 256 256" xml:space="preserve">

                Ucapkan Pesan
            </button>
        </div>
    </main>
